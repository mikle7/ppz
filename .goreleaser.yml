version: 2

# ppz release pipeline.
#
# Triggered on workflow_dispatch by .github/workflows/release.yml.
# Builds ppz, ppz-server, ppz-desktop, and ppz-natsbootstrap for
# linux/darwin × amd64/arm64, archives them per-platform, computes
# checksums, and uploads to the matching GitHub Release.
#
# install.sh is opinionated about WHICH of these to drop into a user's
# PATH: by default just `ppz` + `ppz-desktop`; `PPZ_INCLUDE_SERVER=1`
# adds `ppz-server` + `ppz-natsbootstrap` for self-hosters. The tarball
# carries all four either way; install.sh just picks.

before:
  hooks:
    - go mod tidy

builds:
  - id: ppz
    main: ./cmd/ppz
    binary: ppz
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X github.com/pipescloud/ppz/internal/version.Version={{.Version}}
      - -X github.com/pipescloud/ppz/internal/version.BuildSHA={{.ShortCommit}}

  - id: ppz-server
    main: ./cmd/ppz-server
    binary: ppz-server
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X github.com/pipescloud/ppz/internal/version.Version={{.Version}}
      - -X github.com/pipescloud/ppz/internal/version.BuildSHA={{.ShortCommit}}

  - id: ppz-desktop
    main: ./cmd/ppz-desktop
    binary: ppz-desktop
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X github.com/pipescloud/ppz/internal/version.Version={{.Version}}
      - -X github.com/pipescloud/ppz/internal/version.BuildSHA={{.ShortCommit}}

  # ppz-seed is intentionally NOT published in release tarballs.
  # It only populates the OSS test fixtures (foo/bar/alpha/beta hardcoded
  # in internal/seed/seed.go) and is built from source by the compose
  # e2e harness when needed. Shipping it would mislead users into
  # thinking it's a production data-bootstrapping tool — it isn't.

  - id: ppz-natsbootstrap
    main: ./cmd/ppz-natsbootstrap
    binary: ppz-natsbootstrap
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags: [-s, -w]

archives:
  - id: default
    builds: [ppz, ppz-server, ppz-desktop, ppz-natsbootstrap]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - docs/**/*

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: '{{ incpatch .Version }}-snapshot'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'Merge pull request'
