name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: vet · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test -race ./...
      - run: make build

  e2e:
    name: docker compose e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Run e2e suite
        run: make e2e
      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose -f compose/docker-compose.yml ps
          docker compose -f compose/docker-compose.yml logs --no-color --tail=200
      - name: Tear down
        if: always()
        run: make compose-down

  e2e-reliability:
    name: docker compose e2e-reliability
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Run reliability suite
        run: make e2e-reliability
      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose -f compose/docker-compose.yml -f compose/docker-compose.reliability.yml ps
          docker compose -f compose/docker-compose.yml -f compose/docker-compose.reliability.yml logs --no-color --tail=200
      - name: Tear down
        if: always()
        run: make e2e-reliability-down
