name: Release

# Manual distribution. Pick a tag from the workflow_dispatch input and
# goreleaser will build every cmd/* binary for linux/darwin × amd64/arm64
# and attach the archives + checksums to the matching GitHub Release.
#
# Tags are minted automatically by auto-tag.yml on each merge to main
# (Conventional Commits → semver bump). Distributing one is a separate,
# explicit step — fire this workflow when you actually want the binaries
# published.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.17.0). Defaults to the latest tag."
        required: false
        default: ""

permissions:
  contents: write   # goreleaser needs this to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history for changelog

      - name: Resolve tag
        id: ref
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(git describe --tags --abbrev=0 --match='v*')
          fi
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag $TAG does not exist" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "releasing $TAG"

      # Tell goreleaser to compute the changelog against the previous
      # *released* tag, not the previous git tag. auto-tag.yml mints a
      # tag on every merge but we only publish some of them — without
      # this, commits under skipped tags fall off the changelog (e.g.
      # v0.40.2 only showed #102 because v0.40.0/v0.40.1 were tagged
      # but never released, so goreleaser's default `git describe`
      # picked v0.40.1 as "previous" and dropped #100 and #101).
      #
      # We intersect (ancestors-of-TAG) with (released tags) and pick
      # the highest semver. Using --merged keeps us robust against
      # backfilled releases on side branches; using sort -V keeps us
      # robust against releases that were published out of order.
      # If no prior release exists, leave the env var empty —
      # goreleaser falls back to its default in that case.
      - name: Resolve previous released tag
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ref.outputs.tag }}
        run: |
          set -euo pipefail
          git tag --merged "$TAG" --list 'v*' \
            | grep -vxF "$TAG" \
            | sort -u > /tmp/ancestor-tags
          gh release list --limit 200 --exclude-drafts \
            --json tagName --jq '.[].tagName' \
            | sort -u > /tmp/released-tags
          PREV=$(comm -12 /tmp/ancestor-tags /tmp/released-tags \
            | sort -V -r \
            | head -n 1 || true)
          if [ -n "$PREV" ]; then
            echo "changelog will span ${PREV}..${TAG}"
          else
            echo "no prior released tag found; using goreleaser default"
          fi
          echo "prev=$PREV" >> "$GITHUB_OUTPUT"

      - name: Check out tag
        run: git checkout "${{ steps.ref.outputs.tag }}"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Empty string = unset for goreleaser; it falls back to its
          # default `git describe`-based previous-tag detection.
          GORELEASER_PREVIOUS_TAG: ${{ steps.prev.outputs.prev }}

      - name: Publish update manifest
        env:
          TAG: ${{ steps.ref.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("update/manifest.json")
          manifest = json.loads(path.read_text())
          manifest["latest_version"] = os.environ["TAG"]
          path.write_text(json.dumps(manifest, indent=2) + "\n")
          PY
          if git diff --quiet -- update/manifest.json; then
            echo "update manifest already points at ${TAG}"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add update/manifest.json
          git commit -m "chore: publish ${TAG} update manifest"
          # Concurrent pushes to main between the `git checkout` above
          # and this push will reject as non-fast-forward. Rebase and
          # retry a few times — the manifest commit is one line and
          # cleanly rebases on top of anything reasonable.
          for attempt in 1 2 3; do
            if git push origin main; then
              break
            fi
            echo "push rejected (attempt $attempt); rebasing on origin/main"
            git fetch origin main
            git rebase origin/main
          done
