# WAN-mode overlay for the e2e suite.
#
# Layers on top of compose/docker-compose.yml; together they spin up
# the same stack with one twist: daemon-a's egress traffic is shaped
# with `tc netem delay $PPZ_WAN_DELAY` (default 200 ms) so we can
# assert hot paths stay efficient under realistic operator-to-server
# latency.
#
# Used by `make e2e-wan{,-up,-run,-rebuild}`. Tests live under
# tests/wan/* — the standard tests/run.sh skips this directory so
# WAN scenarios never run under the unprimed (no-latency) stack.

services:
  daemon-a:
    # Keep the same uid (1000 / ppz) as the standard image so files
    # written to the shared volume (credentials, sock) are readable
    # when the standard suite runs against the same volume next.
    # NET_ADMIN cap is sufficient to run `tc` even as a non-root user.
    cap_add: [NET_ADMIN]
    entrypoint: ["/wan-entrypoint.sh"]
    environment:
      PPZ_HOME: /home/ppz
      PPZ_IPC_SOCKET: /home/ppz/daemon.sock
      PPZ_WAN_DELAY: "200ms"
