# ppz Phase 1 e2e harness.
#
# Topology mirrors the user's spec:
#   local-a (test-runner) <-> daemon-a <-> ppz-server <-> daemon-b <-> local-b
#
# Boot order is enforced via depends_on healthchecks. The seeder runs as part
# of ppz-server's entrypoint and writes plaintext keys + org IDs into the
# /seed shared volume so test-runner can read them by file.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ppz
      POSTGRES_DB: ppz
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ppz"]
      interval: 1s
      timeout: 3s
      retries: 30
    networks: [ppz]

  mock-github:
    build:
      context: ..
      dockerfile: compose/Dockerfile.mock-github
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/healthz | grep -q ok"]
      interval: 1s
      timeout: 3s
      retries: 30
    ports:
      - "9000:9000"   # exposed so the host browser can hit the OAuth authorize page
    networks: [ppz]

  ppz-server:
    build:
      context: ..
      dockerfile: compose/Dockerfile.server
    environment:
      PPZ_DB_URL: postgres://postgres:ppz@postgres:5432/ppz?sslmode=disable
      PPZ_HTTP_ADDR: ":8080"
      PPZ_NATS_ADDR: ":4222"
      # NATS URL is derived from the request's Host header — compose-internal
      # clients automatically get nats://ppz-server:4222, host clients (via
      # http://localhost:8080) get nats://localhost:4222. Set
      # PPZ_NATS_PUBLIC_URL to override.
      PPZ_SEED: "true"
      PPZ_SEED_DIR: /seed
      # Auth V2: GitHub URLs point at mock-github so e2e tests exercise
      # the full OAuth flow without real github.com. Production sets
      # none of these → defaults to real GitHub.
      # BASE_URL + AUTHORIZE_URL use docker-internal hostnames so the
      # in-network e2e suite can follow OAuth redirects via `curl -L`.
      # mock-github's port is exposed on :9000 of the host so a human
      # reviewer can also drive the flow in a browser — but doing so
      # requires `127.0.0.1 mock-github ppz-server` in /etc/hosts so the
      # docker hostnames resolve from the host. Without that, use
      # `/dev/login` (PPZ_DEV_LOGIN is true below) to skip OAuth.
      PPZ_BASE_URL: "http://ppz-server:8080"
      PPZ_GITHUB_CLIENT_ID: "test-client"
      PPZ_GITHUB_CLIENT_SECRET: "test-secret"
      PPZ_GITHUB_AUTHORIZE_URL: "http://mock-github:9000/login/oauth/authorize"
      PPZ_GITHUB_TOKEN_URL: "http://mock-github:9000/login/oauth/access_token"
      PPZ_GITHUB_USER_URL: "http://mock-github:9000/user"
      PPZ_SESSION_KEY: "compose-test-session-key-32-bytes-x"
      PPZ_DEV_LOGIN: "true"
      PPZ_JETSTREAM_STORE_DIR: /var/lib/ppz/jetstream
    depends_on:
      postgres:
        condition: service_healthy
      mock-github:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz | grep -q ok"]
      interval: 1s
      timeout: 3s
      retries: 60
    volumes:
      - seed:/seed
      - ppz-jetstream:/var/lib/ppz/jetstream
    ports:
      - "8080:8080"   # GUI + HTTP API on http://localhost:8080
      - "4222:4222"   # NATS — needed by host CLI; set PPZ_NATS_URL=nats://localhost:4222
    networks: [ppz]

  daemon-a:
    build:
      context: ..
      dockerfile: compose/Dockerfile.daemon
    command: ["ppz", "daemon", "start", "--foreground"]
    environment:
      PPZ_HOME: /home/ppz
      PPZ_IPC_SOCKET: /home/ppz/daemon.sock
    depends_on:
      ppz-server:
        condition: service_healthy
    volumes:
      - daemon-a-home:/home/ppz
    networks: [ppz]

  daemon-b:
    build:
      context: ..
      dockerfile: compose/Dockerfile.daemon
    command: ["ppz", "daemon", "start", "--foreground"]
    environment:
      PPZ_HOME: /home/ppz
      PPZ_IPC_SOCKET: /home/ppz/daemon.sock
    depends_on:
      ppz-server:
        condition: service_healthy
    volumes:
      - daemon-b-home:/home/ppz
    networks: [ppz]

  test-runner:
    build:
      context: ..
      dockerfile: compose/Dockerfile.testrunner
    environment:
      PPZ_SERVER_URL: http://ppz-server:8080
      PPZ_DAEMON_A_HOME: /tmp/a
      PPZ_DAEMON_B_HOME: /tmp/b
    depends_on:
      ppz-server:
        condition: service_healthy
      daemon-a:
        condition: service_started
      daemon-b:
        condition: service_started
    volumes:
      - ../tests:/tests:ro
      - daemon-a-home:/tmp/a
      - daemon-b-home:/tmp/b
      - seed:/seed:ro
    command: ["bash", "/tests/run.sh"]
    networks: [ppz]

networks:
  ppz: {}

volumes:
  seed: {}
  daemon-a-home: {}
  daemon-b-home: {}
  ppz-jetstream: {}
