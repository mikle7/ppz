# Overlay for local manual testing — used by `make dev`.
#
# Phase 2 Cycle E stripped GitHub OAuth from OSS. For local manual
# testing the server runs in auth_mode=none and skipped-session-check
# via PPZ_DEV_LOGIN. Production deployments that want OAuth use
# auth_mode=oauth with an out-of-tree Provider implementation
# (pipescloud's, for example).
services:
  ppz-server:
    environment:
      PPZ_BASE_URL: "http://localhost:8080"
      PPZ_SESSION_KEY: ${PPZ_SESSION_KEY}
      PPZ_SERVER_AUTH_MODE: "none"
