# Reliability suite overlay. Layers on top of compose/docker-compose.yml;
# adds Docker-socket access to the test-runner so reliability scenarios
# can dynamically stop / start the `ppz-server` container (simulating
# NATS outages, daemon-side connection drops, etc.).
#
# Used by `make e2e-reliability{,-up,-run,-rebuild}`. Tests live under
# tests/reliability/* — the standard tests/run.sh skips this directory
# so reliability scenarios only run under this overlay (where the
# socket is mounted).
#
# The Docker socket grants effective root on the host, so this overlay
# is OFF by default — only `make e2e-reliability` uses it.

services:
  test-runner:
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  ppz-server:
    environment:
      # Short NATS user-JWT TTL (prod default: 5m) so refresh-window
      # scenarios fit the 300s reliability cap. Refresh fires at
      # exp-30s = login+90s; scenarios that must NOT be rescued by the
      # rotation timer (daemon-reconnects-after-zombie-close) keep
      # their assertion windows under that. Honored only because the
      # base compose sets PPZ_DEV_LOGIN=true.
      PPZ_NATS_JWT_TTL: "120s"
