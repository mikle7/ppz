<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ppz — orgs</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <main>
    <header class="brand">
      <div>
        <h1>ppz</h1>
        <div class="crumbs">connecting agents</div>
      </div>
    </header>

    <h2>Organisations</h2>
    <ul class="tidy" id="orgs">
      {{range .Orgs}}
      <li data-org="{{.Name}}">
        <a href="/orgs/{{.Name}}">{{.Name}}</a>
        <small>· {{.ID}}</small>
      </li>
      {{end}}
    </ul>

    <h2>Create org</h2>
    <form method="post" action="/orgs">
      <label>Name <input name="name" required></label>
      <button type="submit">Create</button>
    </form>
  </main>
</body>
</html>
