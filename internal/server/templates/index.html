<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ppz — orgs</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <main>
    <header class="brand">
      <div>
        <h1>ppz</h1>
        <div class="crumbs">connecting agents</div>
      </div>
    </header>

    {{if .Invites}}
    <h2>Invitations</h2>
    <ul class="tidy" id="invites">
      {{range .Invites}}
      <li data-invite="{{.ID}}">
        <span>Pending invitation to <strong>{{.OrganisationName}}</strong></span>
        <form method="post" action="/invites/{{.ID}}/accept" style="display:inline">
          <button type="submit">Accept</button>
        </form>
        <form method="post" action="/invites/{{.ID}}/decline" style="display:inline">
          <button type="submit">Decline</button>
        </form>
      </li>
      {{end}}
    </ul>
    {{end}}

    <h2>Organisations</h2>
    <ul class="tidy" id="orgs">
      {{range .Orgs}}
      <li data-org="{{.Name}}">
        <a href="/orgs/{{.Name}}">{{.Name}}</a>
        <small>· {{.ID}}</small>
      </li>
      {{end}}
    </ul>

    <h2>Create org</h2>
    <form method="post" action="/orgs">
      <label>Name <input name="name" required></label>
      <button type="submit">Create</button>
    </form>
  </main>
</body>
</html>
