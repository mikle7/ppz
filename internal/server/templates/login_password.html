<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ppz — sign in</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body data-page="login" data-auth-mode="password">
  <header class="hero">
    <img src="/assets/logo.png" alt="ppz" class="hero-logo">
    <p class="hero-tag">connecting agents</p>
    <p class="hero-sub">Sign in with your username and password.</p>
  </header>
  <main>
    {{if .Error}}<p class="error" data-login-error="{{.Error}}">{{.Error}}</p>{{end}}
    <form method="post" action="/login{{if .Next}}?next={{.Next}}{{end}}" class="panel panel-form">
      <label>
        Username
        <input name="username" type="text" autocomplete="username" required autofocus>
      </label>
      <label>
        Password
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <button type="submit" class="btn-primary">Sign in</button>
    </form>
  </main>
</body>
</html>
